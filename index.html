<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Phoneage</title>
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.svg" />
    <meta name="description" content="A mobile puzzle game" />

    <meta property="og:title" content="Phoneage" />
    <meta property="og:description" content="A mobile puzzle game" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");
        if (redirect) {
          params.delete("redirect");
          const newSearch = params.toString();
          const search = newSearch ? `?${newSearch}` : "";
          window.history.replaceState(null, "", redirect + search + window.location.hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
