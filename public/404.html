<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        var segments = l.pathname.split("/");
        var repo = segments.length > 1 ? segments[1] : "";
        var base = repo ? "/" + repo + "/" : "/";
        var target = base + "?redirect=" + encodeURIComponent(path);
        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
