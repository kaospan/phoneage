<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var l = window.location;
        var params = new URLSearchParams(l.search);
        params.delete("redirect");
        var search = params.toString();
        var path = l.pathname + (search ? "?" + search : "") + l.hash;
        var segments = l.pathname.split("/");
        var isGitHubPages = /\.github\.io$/i.test(l.hostname);
        var repo = isGitHubPages && segments.length > 1 ? segments[1] : "";
        var base = repo ? "/" + repo + "/" : "/";
        var target = base + "?redirect=" + encodeURIComponent(path);
        l.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
